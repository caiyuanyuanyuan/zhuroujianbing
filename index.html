<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我是小锹-福来倾情提供</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #FF00FA;
    font-family: "Microsoft YaHei", sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  /* ================= 页面大框架微调（减少整体间隔） ================= */
  .top-section {
    height: 52vh; /* 略微压缩高度让整体更紧凑 */
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 0 40px; /* 让两侧元素往中间靠拢，远离屏幕边缘 */
  }
  
  .content-box {
    width: 100%;
    max-width: 800px; /* 限制PC端最大宽度，防止离得太开 */
    height: 90%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  
  /* ================= 双截棍（大改版：放大、向内靠） ================= */
  .nunchaku {
    width: 160px;   /* 宽度加大 */
    height: 380px;  /* 高度拉长 */
    position: relative;
    cursor: pointer; /* 提示可以点击 */
    transition: transform 0.2s;
  }
  /* 专属新增：点击棍子时的“大乱斗挥动”动画 */
  .nunchaku.hit-action {
    animation: swingStrike 0.4s ease-in-out;
  }
  @keyframes swingStrike {
    0% { transform: rotate(0deg) translateX(0); }
    30% { transform: rotate(-30deg) translateX(-20px); } /* 蓄力向后退 */
    70% { transform: rotate(70deg) translateX(180px) translateY(-40px); } /* 狠狠向右前方挥击 */
    100% { transform: rotate(0deg) translateX(0); }
  }

  .stick {
    width: 24px;    /* 棍子加粗 */
    height: 150px;  /* 棍子拉长 */
    background: 
      radial-gradient(circle, #444 3px, transparent 3px) 0 0 / 10px 10px,
      linear-gradient(#333, #111);
    border-radius: 12px;
    position: absolute;
    left: 68px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.6);
  }
  .stick.top { top: 0; transform: rotate(-15deg); transform-origin: bottom center; }
  .stick.bottom { bottom: 0; transform: rotate(15deg); transform-origin: top center; }
  .chain {
    position: absolute;
    top: 145px;     /* 适配新高度 */
    left: 76px;
    width: 12px;    /* 链条加粗 */
    height: 95px;
    background: 
      radial-gradient(circle, #fff 4px, transparent 4px) 0 0 / 10px 10px,
      linear-gradient(#eee, #888);
    border-radius: 6px;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
  }
  
  /* ================= 可爱铲子（大改版：放大） ================= */
  .shovel {
    width: 180px;   /* 宽度整体放大 */
    height: 360px;  /* 高度整体放大 */
    position: relative;
  }
  /* 专属新增：被棍子敲击时，“铲子害羞闪烁扭动”动画 */
  .shovel.shy-action {
    animation: blushFlash 0.6s ease-in-out;
  }
  @keyframes blushFlash {
    0% { transform: scale(1) rotate(0deg); }
    20% { transform: scale(0.9) rotate(-10deg); }
    40% { transform: scale(1.15) rotate(10deg); }
    60% { transform: scale(1.1) rotate(-5deg); }
    80% { transform: scale(1.05) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .shovel-handle {
    width: 20px;    /* 把手加粗 */
    height: 180px;  /* 把手拉长 */
    background: 
      radial-gradient(circle, #8B4513 3px, transparent 3px) 0 0 / 9px 9px,
      linear-gradient(#A0522D, #8B4513);
    border-radius: 10px;
    position: absolute;
    top: 0;
    left: 80px;
  }
  .shovel-head {
    width: 140px;   /* 铲头放大 */
    height: 110px;  /* 铲头放大 */
    background: 
      radial-gradient(circle, #C0C0C0 3px, transparent 3px) 0 0 / 10px 10px,
      linear-gradient(#E8E8E8, #A8A8A8);
    border-radius: 0 0 70px 70px;
    position: absolute;
    bottom: 50px;
    left: 20px;
    border: 4px solid #777;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    transition: all 0.3s;
  }
  /* 可爱腮红放大 */
  .shovel-head::before,
  .shovel-head::after {
    content: "";
    position: absolute;
    width: 26px;
    height: 14px;
    background: #FFB6C1;
    border-radius: 50%;
    top: 35px;
    opacity: 0.8;
    transition: all 0.2s;
  }
  .shovel-head::before { left: 20px; }
  .shovel-head::after { right: 20px; }
  
  /* 专属新增：大乱斗时让腮红变得更红更红 */
  .shovel.shy-action .shovel-head::before,
  .shovel.shy-action .shovel-head::after {
    background: #FF1493 !important;
    transform: scale(1.6);
    opacity: 1;
  }

  /* 可爱眼睛放大 */
  .shovel-eyes {
    position: absolute;
    top: 15px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #333;
  }
  
  /* ================= 中间旋转文字（大改版：字号翻倍、黄红交替） ================= */
  .circle-text-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 320px;   /* 扩大容器容纳大字 */
    height: 320px;
  }
  .center-emoji {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px; /* 恶魔颜表情放大 */
    z-index: 2;
    animation: bounce 1.2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }
  .rotate-ring {
    width: 100%;
    height: 100%;
    position: relative;
    animation: spin 5s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  /* 核心修改：字号翻倍由 42px -> 84px，黄红交替配色 */
  .rotate-text {
    position: absolute;
    font-size: 84px; 
    font-weight: 900;
    left: 50%;
    top: 50%;
    transform-origin: center center;
    text-shadow: 3px 3px 0px #000; /* 给大字加个黑色阴影，更具冲击力 */
  }
  .text-1 { color: #FFD700; transform: translate(-50%, -180px); } /* 我 - 黄 */
  .text-2 { color: #FF0000; transform: translate(120px, -50%); }  /* 是 - 红 */
  .text-3 { color: #FFD700; transform: translate(-50%, 100px); }  /* 小 - 黄 */
  .text-4 { color: #FF0000; transform: translate(-200px, -50%); } /* 锹 - 红 */
  
  /* ================= 中部文本区（微调高，减少间距） ================= */
  .middle-section {
    height: 24vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 0 10px;
    position: relative; /* 为新增弹幕提供定位基准 */
  }
  .fan-text {
    font-size: 38px; /* 字体放大 */
    font-weight: bold;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    animation: pulseColor 2s ease-in-out infinite;
    z-index: 5; /* 保证原字在弹幕上方 */
  }
  .fan-code {
    font-size: 30px; /* 字体放大 */
    font-family: "Courier New", monospace;
    font-weight: bold;
    animation: pulseColor 2s ease-in-out infinite reverse;
    letter-spacing: 4px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    z-index: 5;
  }
  @keyframes pulseColor {
    0% { color: #FFFF00; transform: scale(1); }
    25% { color: #00FFFF; transform: scale(1.08); }
    50% { color: #00FF00; transform: scale(1); }
    75% { color: #FF00FF; transform: scale(1.08); }
    100% { color: #FFFF00; transform: scale(1); }
  }

  /* 专属新增：“棍铲99” 无限横向滚动弹幕样式 */
  .danmaku-container {
    position: absolute;
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.35; /* 半透明效果，作为精致背景暗纹 */
    font-size: 26px;
    font-weight: bold;
  }
  .danmaku-top { top: -10px; }
  .danmaku-bottom { bottom: -10px; }
  
  .danmaku-track {
    display: inline-block;
    animation: marquee 12s linear infinite;
  }
  .danmaku-track.reverse {
    animation: marqueeReverse 12s linear infinite;
  }
  /* 黄红交替的高级质感 */
  .danmaku-track span:nth-child(odd) { color: #FFD700; text-shadow: 1px 1px 2px #000; }
  .danmaku-track span:nth-child(even) { color: #FF0000; text-shadow: 1px 1px 2px #000; }

  @keyframes marquee {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-50%, 0, 0); }
  }
  @keyframes marqueeReverse {
    0% { transform: translate3d(-50%, 0, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  
  /* ================= 底部问答区（微调高，内容做大） ================= */
  .bottom-section {
    height: 24vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 25px;
  }
  .question {
    font-size: 42px; /* 字体放大 */
    font-weight: bold;
    color: #fff;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  }
  .btn-group {
    display: flex;
    gap: 80px;
  }
  .btn {
    padding: 15px 45px; /* 按钮做大 */
    font-size: 28px;    /* 字体做大 */
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    background: #fff;
    color: #FF00FA;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .btn:hover {
    transform: scale(1.15);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }
  
  /* 谢谢你弹窗效果 */
  .thank-you {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 90px;
    font-weight: bold;
    color: #fff;
    text-shadow: 
      0 0 15px #FFD700,
      0 0 25px #FFD700,
      0 0 40px #FF69B4;
    z-index: 100;
    pointer-events: none;
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .thank-you.show {
    transform: translate(-50%, -50%) scale(1);
    animation: wiggle 1s ease-in-out infinite 0.5s;
  }
  @keyframes wiggle {
    0%, 100% { transform: translate(-50%, -50%) rotate(-5deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(5deg) scale(1.05); }
  }
  
  /* ================= 手机端精准适配（等比例整体放大） ================= */
  @media screen and (max-width: 768px) {
    .top-section {
      padding: 0 20px; /* 手机端也保持内缩，防止靠边 */
    }
    /* 双截棍手机端 */
    .nunchaku {
      width: 90px;
      height: 240px;
    }
    .stick {
      width: 16px;
      height: 90px;
      left: 37px;
    }
    .chain {
      top: 90px;
      left: 42px;
      width: 8px;
      height: 70px;
    }
    /* 适配大乱斗手机端位移 */
    @keyframes swingStrike {
      0% { transform: rotate(0deg) translateX(0); }
      30% { transform: rotate(-30deg) translateX(-10px); }
      70% { transform: rotate(70deg) translateX(90px) translateY(-20px); }
      100% { transform: rotate(0deg) translateX(0); }
    }

    /* 铲子手机端 */
    .shovel {
      width: 110px;
      height: 220px;
    }
    .shovel-handle {
      width: 14px;
      height: 110px;
      left: 48px;
    }
    .shovel-head {
      width: 86px;
      height: 68px;
      left: 12px;
      bottom: 30px;
    }
    .shovel-head::before, .shovel-head::after {
      width: 16px;
      height: 9px;
      top: 22px;
    }
    .shovel-eyes {
      font-size: 18px;
      top: 8px;
    }
    /* 中间旋转环与大字（手机端翻倍） */
    .circle-text-wrap {
      width: 200px;
      height: 200px;
    }
    .center-emoji {
      font-size: 60px;
    }
    .rotate-text {
      font-size: 52px; /* 手机端字号同步大翻倍 */
    }
    .text-1 { transform: translate(-50%, -115px); }
    .text-2 { transform: translate(75px, -50%); }
    .text-3 { transform: translate(-50%, 65px); }
    .text-4 { transform: translate(-125px, -50%); }
    
    /* 中下部文本 */
    .fan-text { font-size: 24px; }
    .fan-code { font-size: 20px; }
    .question { font-size: 30px; }
    .btn { padding: 12px 30px; font-size: 22px; }
    .thank-you { font-size: 54px; }
    .danmaku-container { font-size: 18px; }
  }
  
  /* 超小屏手机（480px以下）微调，确保不爆框 */
  @media screen and (max-width: 480px) {
    .nunchaku { width: 75px; height: 190px; }
    .stick { width: 13px; height: 75px; left: 31px; }
    .chain { top: 75px; left: 35px; width: 6px; height: 50px; }
    .shovel { width: 85px; height: 180px; }
    .shovel-handle { width: 10px; height: 90px; left: 37px; }
    .shovel-head { width: 70px; height: 55px; left: 7px; bottom: 25px; }
    .circle-text-wrap { width: 160px; height: 160px; }
    .center-emoji { font-size: 50px; }
    .rotate-text { font-size: 44px; }
    .text-1 { transform: translate(-50%, -95px); }
    .text-2 { transform: translate(60px, -50%); }
    .text-3 { transform: translate(-50%, 55px); }
    .text-4 { transform: translate(-105px, -50%); }
    .fan-text { font-size: 20px; }
    .fan-code { font-size: 16px; }
    .question { font-size: 24px; }
    .btn { padding: 10px 24px; font-size: 18px; }
    
    @keyframes swingStrike {
      0% { transform: rotate(0deg) translateX(0); }
      30% { transform: rotate(-30deg) translateX(-5px); }
      70% { transform: rotate(70deg) translateX(65px) translateY(-15px); }
      100% { transform: rotate(0deg) translateX(0); }
    }
  }
</style>
</head>
<body>
  <!-- 上部区域 -->
  <div class="top-section">
    <div class="content-box">
      <!-- 双截棍（大版 - 绑定点击大乱斗事件） -->
      <div class="nunchaku" id="nunchakuBtn" onclick="triggerMelee()">
        <div class="stick top"></div>
        <div class="chain"></div>
        <div class="stick bottom"></div>
      </div>
      
      <!-- 中间旋转文字（超级加深刻字版、黄红交替） -->
      <div class="circle-text-wrap">
        <div class="center-emoji">😈</div>
        <div class="rotate-ring">
          <div class="rotate-text text-1">我</div>
          <div class="rotate-text text-2">是</div>
          <div class="rotate-text text-3">小</div>
          <div class="rotate-text text-4">锹</div>
        </div>
      </div>
      
      <!-- 可爱铲子（大版） -->
      <div class="shovel" id="shovelTarget">
        <div class="shovel-handle"></div>
        <div class="shovel-head">
          <div class="shovel-eyes">•‿•</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 中部区域 -->
  <div class="middle-section">
    <!-- 专属新增：上方横向循环滚动弹幕（正向） -->
    <div class="danmaku-container danmaku-top">
      <div class="danmaku-track">
        <span>棍铲99 💛❤️ </span><span>棍铲99 ❤️💛 </span><span>棍铲99 💛❤️ </span><span>棍铲99 ❤️💛 </span>
        <span>棍铲99 💛❤️ </span><span>棍铲99 ❤️💛 </span><span>棍铲99 💛❤️ </span><span>棍铲99 ❤️💛 </span>
      </div>
    </div>

    <div class="fan-text">朱苏狠狠做，天天做，夜夜做。</div>
    <div class="fan-code">zzxcdsxhjl</div>

    <!-- 专属新增：下方横向循环滚动弹幕（反向错落） -->
    <div class="danmaku-container danmaku-bottom">
      <div class="danmaku-track reverse">
        <span>棍铲99 ❤️💛 </span><span>棍铲99 💛❤️ </span><span>棍铲99 ❤️💛 </span><span>棍铲99 💛❤️ </span>
        <span>棍铲99 ❤️💛 </span><span>棍铲99 💛❤️ </span><span>棍铲99 ❤️💛 </span><span>棍铲99 💛❤️ </span>
      </div>
    </div>
  </div>
  
  <!-- 底部区域 -->
  <div class="bottom-section">
    <div class="question">你喜欢我嘛</div>
    <div class="btn-group">
      <button class="btn" onclick="likeYes()">喜欢</button>
      <button class="btn" onclick="likeNo()">不喜欢</button>
    </div>
  </div>
  
  <!-- 弹窗 -->
  <div class="thank-you" id="thankYou">谢谢你！💖</div>

<script>
  // 专属新增：“棍铲大乱斗”逻辑核心代码
  function triggerMelee() {
    const nunchaku = document.getElementById("nunchakuBtn");
    const shovel = document.getElementById("shovelTarget");
    
    // 防止动画重叠，先移除类
    nunchaku.classList.remove("hit-action");
    shovel.classList.remove("shy-action");
    
    // 强制触发重绘
    void nunchaku.offsetWidth;
    void shovel.offsetWidth;
    
    // 棍子挥舞！
    nunchaku.classList.add("hit-action");
    
    // 延时 0.15 秒（等棍子划到右侧击中铲子时），触发铲子害羞闪烁效果
    setTimeout(() => {
      shovel.classList.add("shy-action");
    }, 150);
  }

  function likeNo() {
    alert("我管你喜不喜欢😈");
  }
  
  function likeYes() {
    const el = document.getElementById("thankYou");
    el.classList.add("show");
    setTimeout(() => {
      el.classList.remove("show");
    }, 3000);
  }
</script>
</body>
</html>
