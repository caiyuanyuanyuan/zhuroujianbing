<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#d91461">
  <title>棍铲婚礼现场</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <!-- 页面1：开场欢迎页 -->
    <section id="welcomePage" class="page welcome-page is-active" aria-label="开场欢迎页">
      <div class="welcome-glow"></div>
      <div class="welcome-content">
        <p class="welcome-kicker">ZHU ZHIXIN × SU XINHAO</p>
        <h1>欢迎参加棍铲的婚礼</h1>
        <div class="welcome-divider"><span></span><b>♥</b><span></span></div>
        <p class="welcome-note">婚礼现场即将开启</p>
      </div>
    </section>

    <!-- 页面2：选择页 -->
    <section id="choicePage" class="page child-page choice-page" aria-label="婚礼选择页">
      <div class="choice-card glass-card">
        <div class="choice-photo-wrap">
          <img src="合照.jpg" alt="朱志鑫和苏新皓合照" class="choice-photo">
          <div class="photo-fallback">朱苏合照<br><small>请放入：合照.jpg</small></div>
        </div>
        <h2>你愿意参加棍铲的婚礼吗？</h2>
        <div class="choice-actions">
          <button id="agreeBtn" class="primary-btn" type="button">愿意</button>
          <button id="refuseBtn" class="secondary-btn" type="button">不愿意</button>
        </div>
      </div>
    </section>

    <!-- 页面3：主功能按钮页 -->
    <section id="mainPage" class="page child-page main-page" aria-label="主功能页">
      <div class="hero-photo-wrap">
        <img src="hezhao.jpg" alt="棍铲婚礼合照" class="hero-photo">
        <div class="photo-fallback hero-fallback">棍铲婚礼合照<br><small>请放入：hezhao.jpg</small></div>
        <div class="hero-shade"></div>
        <div class="hero-copy">
          <span>朱志鑫 &amp; 苏新皓</span>
          <h1>我们的婚礼现场</h1>
        </div>
      </div>

      <div class="function-zone">
        <div class="function-buttons" aria-label="婚礼功能按钮">
          <button class="round-function-btn" type="button" data-action="about"><span>关于</span><b>我们</b></button>
          <button class="round-function-btn highlight" type="button" data-action="banquet"><span>进入</span><b>入席</b></button>
          <button class="round-function-btn" type="button" data-action="bow1"><span>一拜</span><b>天地</b></button>
          <button class="round-function-btn" type="button" data-action="bow2"><span>二拜</span><b>高堂</b></button>
          <button class="round-function-btn" type="button" data-action="bow3"><span>夫妻</span><b>对拜</b></button>
          <button class="round-function-btn" type="button" data-action="end"><span>婚礼</span><b>END</b></button>
        </div>
      </div>

      <button id="musicLeftBtn" class="floating-music floating-music-left" type="button" aria-pressed="false">
        <span class="music-icon">♫</span><span>只看着我</span>
      </button>
      <button id="musicRightBtn" class="floating-music floating-music-right" type="button" aria-pressed="false">
        <span>罗生门</span><span class="music-icon">♫</span>
      </button>

      <audio id="musicLeft" preload="metadata" loop src="只看着我.mp3"></audio>
      <audio id="musicRight" preload="metadata" loop src="罗生门.mp3"></audio>
    </section>

    <!-- 页面4：四个包厢共用宴席视图，数据按 room1-room4 隔离 -->
    <section id="banquetPage" class="page child-page banquet-page" aria-label="宴席包厢">
      <button class="back-home-btn" type="button" data-back-main>← 返回</button>

      <nav id="roomSwitcher" class="room-switcher" aria-label="切换包厢"></nav>

      <div class="banquet-layout">
        <header class="wedding-stage">
          <div class="stage-lights"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="stage-content">
            <p>棍铲婚礼宴席</p>
            <h2 id="roomTitle">一号主宴席大厅</h2>
            <div id="syncStatus" class="sync-status" data-state="loading">
              <span class="sync-dot"></span><span class="sync-text">正在连接座位库…</span>
            </div>
          </div>
          <div class="stage-flowers">🌸　💐　🌸</div>
        </header>

        <div class="wedding-corridor" aria-label="新人入场走廊">
          <div class="corridor-carpet"></div>
          <div class="corridor-lights left"><i></i><i></i><i></i><i></i></div>
          <div class="corridor-lights right"><i></i><i></i><i></i><i></i></div>
          <div id="entranceGroup" class="entrance-group" aria-hidden="true">
            <div class="newlyweds-row">
              <span class="newlywed cat-head">🐱</span>
              <span class="newlywed rabbit-head">🐰</span>
            </div>
            <div class="devil-row">
              <span>😈</span><span>😈</span><span>😈
            </div>
            <div class="devil-row">
              <span>😈</span><span>😈</span><span>😈</span><span>😈</span><span>😈</span>
            </div>
          </div>
        </div>

        <div id="tableArea" class="table-area" aria-label="宴席桌位"></div>
      </div>
    </section>

    <!-- 页面8：结束页 -->
    <section id="endPage" class="page child-page end-page" aria-label="婚礼结束页">
      <button class="back-home-btn" type="button" data-back-main>← 返回</button>
      <div class="end-card glass-card">
        <div class="end-hearts">♥ ♥ ♥</div>
        <h2>我们的婚礼结束啦！</h2>
        <p>谢谢大家参加！</p>
        <strong>棍铲狠狠做👊</strong>
      </div>
    </section>
  </main>

  <!-- 通用视频弹窗 -->
  <div id="videoModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="videoModalTitle">
    <div class="video-modal-card">
      <button id="videoCloseIcon" class="modal-close-icon" type="button" aria-label="关闭视频">×</button>
      <h2 id="videoModalTitle">婚礼视频</h2>
      <div id="videoFrameWrap" class="video-frame-wrap">
        <iframe id="douyinFrame" title="抖音婚礼视频" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
        <div id="videoMissing" class="video-missing hidden">
          <p>这个视频还没有配置独立 ID</p>
          <small>请在 script.js 顶部的 VIDEO_CONFIG 中替换。</small>
        </div>
      </div>
      <button id="videoCloseBtn" class="modal-main-btn" type="button">看完返回</button>
    </div>
  </div>

  <!-- 其他亲友身份选择弹窗 -->
  <div id="identityModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="identityTitle">
    <div class="identity-card">
      <button id="identityClose" class="modal-close-icon dark" type="button" aria-label="关闭身份选择">×</button>
      <p class="identity-kicker">请选择你的席位身份</p>
      <h2 id="identityTitle">其他亲友</h2>
      <div id="identityOptions" class="identity-options"></div>
      <div id="customIdentityArea" class="custom-identity-area hidden">
        <label for="customIdentityInput">填写自定义身份</label>
        <input id="customIdentityInput" type="text" maxlength="12" autocomplete="off" placeholder="最多 12 个字">
        <button id="customIdentityConfirm" class="modal-main-btn" type="button">确认落座</button>
      </div>
    </div>
  </div>

  <!-- 通用提示弹窗 -->
  <div id="messageModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="messageTitle">
    <div class="message-card glass-card">
      <div class="message-heart">♥</div>
      <h2 id="messageTitle">提示</h2>
      <p id="messageText"></p>
      <button id="messageOkBtn" class="modal-main-btn" type="button">知道啦</button>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
