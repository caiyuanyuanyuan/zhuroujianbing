<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我是小锹-福来倾情提供</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #FF00FA;
    font-family: "Microsoft YaHei", sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 上部60%区域 */
  .top-section {
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .content-box {
    width: 95%;
    height: 80%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }

  /* 双截棍 - 放大拉长，留出链条空间 */
  .nunchaku {
    width: 120px;
    height: 320px;
    position: relative;
  }
  .stick {
    width: 16px;
    height: 110px;
    background: 
      radial-gradient(circle, #333 2px, transparent 2px) 0 0 / 8px 8px,
      linear-gradient(#222, #111);
    border-radius: 8px;
    position: absolute;
    left: 52px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }
  .stick.top { top: 0; transform: rotate(-15deg); transform-origin: bottom center; }
  .stick.bottom { bottom: 0; transform: rotate(15deg); transform-origin: top center; }
  /* 加粗高亮链条 */
  .chain {
    position: absolute;
    top: 110px;
    left: 56px;
    width: 8px;
    height: 100px;
    background: 
      radial-gradient(circle, #ddd 3px, transparent 3px) 0 0 / 8px 8px,
      linear-gradient(#aaa, #666);
    border-radius: 4px;
  }

  /* 可爱铲子 */
  .shovel {
    width: 140px;
    height: 280px;
    position: relative;
  }
  .shovel-handle {
    width: 14px;
    height: 140px;
    background: 
      radial-gradient(circle, #8B4513 2px, transparent 2px) 0 0 / 7px 7px,
      linear-gradient(#A0522D, #8B4513);
    border-radius: 7px;
    position: absolute;
    top: 0;
    left: 63px;
  }
  .shovel-head {
    width: 100px;
    height: 80px;
    background: 
      radial-gradient(circle, #C0C0C0 2px, transparent 2px) 0 0 / 8px 8px,
      linear-gradient(#E8E8E8, #A8A8A8);
    border-radius: 0 0 50px 50px;
    position: absolute;
    bottom: 40px;
    left: 20px;
    border: 3px solid #888;
  }
  /* 可爱腮红 */
  .shovel-head::before,
  .shovel-head::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 10px;
    background: #FFB6C1;
    border-radius: 50%;
    top: 25px;
    opacity: 0.7;
  }
  .shovel-head::before { left: 15px; }
  .shovel-head::after { right: 15px; }
  /* 可爱眼睛 */
  .shovel-eyes {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 20px;
  }

  /* 中间旋转文字 */
  .circle-text-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    height: 260px;
  }
  .center-emoji {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    z-index: 2;
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }

  .rotate-ring {
    width: 100%;
    height: 100%;
    position: relative;
    animation: spin 4s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .rotate-text {
    position: absolute;
    font-size: 42px;
    font-weight: bold;
    left: 50%;
    top: 50%;
    transform-origin: center center;
  }
  .text-1 { color: #FFD700; transform: translate(-50%, -130px); }
  .text-2 { color: #FFD700; transform: translate(90px, -50%); }
  .text-3 { color: #FF0000; transform: translate(-50%, 90px); }
  .text-4 { color: #FF0000; transform: translate(-130px, -50%); }

  /* 中部20%区域 */
  .middle-section {
    height: 20vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .fan-text {
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    animation: pulseColor 2s ease-in-out infinite;
  }
  .fan-code {
    font-size: 26px;
    font-family: "Courier New", monospace;
    animation: pulseColor 2s ease-in-out infinite reverse;
    letter-spacing: 3px;
  }
  @keyframes pulseColor {
    0% { color: #FFFF00; transform: scale(1); }
    25% { color: #00FFFF; transform: scale(1.15); }
    50% { color: #00FF00; transform: scale(1); }
    75% { color: #FF00FF; transform: scale(1.15); }
    100% { color: #FFFF00; transform: scale(1); }
  }

  /* 底部20%区域 */
  .bottom-section {
    height: 20vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }
  .question {
    font-size: 36px;
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  .btn-group {
    display: flex;
    gap: 60px;
  }
  .btn {
    padding: 12px 30px;
    font-size: 24px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    background: #fff;
    color: #FF00FA;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  /* 谢谢你弹窗效果 */
  .thank-you {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 80px;
    font-weight: bold;
    color: #fff;
    text-shadow: 
      0 0 10px #FFD700,
      0 0 20px #FFD700,
      0 0 30px #FF69B4;
    z-index: 100;
    pointer-events: none;
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .thank-you.show {
    transform: translate(-50%, -50%) scale(1);
    animation: wiggle 1s ease-in-out infinite 0.5s;
  }
  @keyframes wiggle {
    0%, 100% { transform: translate(-50%, -50%) rotate(-5deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(5deg) scale(1.05); }
  }

  /* ========== 手机适配媒体查询 ========== */
  @media screen and (max-width: 768px) {
    /* 双截棍同步加高，链条完整露出 */
    .nunchaku {
      width: 70px;
      height: 190px;
    }
    .stick {
      width: 12px;
      height: 65px;
      left: 29px;
    }
    .chain {
      top: 65px;
      left: 31px;
      width: 6px;
      height: 60px;
      background: radial-gradient(circle, #ddd 2px, transparent 2px) 0 0 / 6px 6px, linear-gradient(#aaa, #666);
    }

    .shovel {
      width: 80px;
      height: 160px;
    }
    .shovel-handle {
      width: 10px;
      height: 80px;
      left: 35px;
    }
    .shovel-head {
      width: 60px;
      height: 48px;
      left: 12px;
      bottom: 24px;
    }
    .shovel-head::before, .shovel-head::after {
      width: 10px;
      height: 6px;
      top: 14px;
    }
    .shovel-eyes {
      font-size: 14px;
      top: 6px;
    }

    /* 中间旋转圆环缩小 */
    .circle-text-wrap {
      width: 160px;
      height: 160px;
    }
    .center-emoji {
      font-size: 48px;
    }
    .rotate-text {
      font-size: 26px;
    }
    .text-1 { transform: translate(-50%, -80px); }
    .text-2 { transform: translate(55px, -50%); }
    .text-3 { transform: translate(-50%, 55px); }
    .text-4 { transform: translate(-80px, -50%); }

    /* 中间文字缩小 */
    .fan-text {
      font-size: 20px;
      padding: 0 10px;
    }
    .fan-code {
      font-size: 16px;
    }

    /* 底部文字按钮 */
    .question {
      font-size: 24px;
    }
    .btn-group {
      gap: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 10px 22px;
      font-size: 18px;
    }

    /* 弹窗文字缩小 */
    .thank-you {
      font-size: 42px;
      padding: 0 10px;
      text-align: center;
    }
  }

  /* 超小屏手机（480px以下） */
  @media screen and (max-width: 480px) {
    .content-box {
      width: 98%;
    }
    .nunchaku {
      width: 55px;
      height: 150px;
    }
    .chain {
      width: 5px;
      height: 48px;
      left: 24px;
      top: 55px;
      background: radial-gradient(circle, #ddd 1.8px, transparent 1.8px) 0 0 / 5px 5px, linear-gradient(#aaa, #666);
    }
    .shovel {
      width: 65px;
      height: 130px;
    }
    .circle-text-wrap {
      width: 130px;
      height: 130px;
    }
    .center-emoji {
      font-size: 38px;
    }
    .rotate-text {
      font-size: 22px;
    }
    .fan-text {
      font-size: 16px;
    }
    .question {
      font-size: 20px;
    }
    .btn {
      padding: 8px 18px;
      font-size: 16px;
    }
  }
</style>
</head>
<body>

  <div class="top-section">
    <div class="content-box">
      <!-- 双截棍 -->
      <div class="nunchaku">
        <div class="stick top"></div>
        <div class="chain"></div>
        <div class="stick bottom"></div>
      </div>

      <!-- 中间旋转文字 -->
      <div class="circle-text-wrap">
        <div class="center-emoji">😈</div>
        <div class="rotate-ring">
          <div class="rotate-text text-1">我</div>
          <div class="rotate-text text-2">是</div>
          <div class="rotate-text text-3">小</div>
          <div class="rotate-text text-4">锹</div>
        </div>
      </div>

      <!-- 可爱铲子 -->
      <div class="shovel">
        <div class="shovel-handle"></div>
        <div class="shovel-head">
          <div class="shovel-eyes">•‿•</div>
        </div>
      </div>
    </div>
  </div>

  <div class="middle-section">
    <div class="fan-text">朱苏狠狠做，天天做，夜夜做。</div>
    <div class="fan-code">zzxcdsxhjl</div>
  </div>

  <div class="bottom-section">
    <div class="question">你喜欢我嘛</div>
    <div class="btn-group">
      <button class="btn" onclick="likeYes()">喜欢</button>
      <button class="btn" onclick="likeNo()">不喜欢</button>
    </div>
  </div>

  <div class="thank-you" id="thankYou">谢谢你！💖</div>

<script>
  function likeNo() {
    alert("我管你喜不喜欢😈");
  }

  function likeYes() {
    const el = document.getElementById("thankYou");
    el.classList.add("show");
    setTimeout(() => {
      el.classList.remove("show");
    }, 3000);
  }
</script>

</body>
</html>
